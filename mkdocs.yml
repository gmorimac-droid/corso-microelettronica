site_name: Corso di Microelettronica Digitale
site_description: Corso completo su HDL, verification e tool FPGA/ASIC
site_url: https://example.github.io/corso-microelettronica/

theme:
  name: material
  language: it
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list      
      
nav:
  - Home: index.md
  - Intro: 00_introduzione.md
  - Fondamenti: 01_fondamenti.md
  - VHDL: 
    - Overview: 02_vhdl.md
    - Flusso di progettazione: 02_vhdl_progettazione.md
  - Verilog:
