site_name: Corso di Microelettronica Digitale
site_description: Corso completo su HDL, verification e tool FPGA/ASIC
site_url: https://gmorimac-droid.github.io/corso-microelettronica/

theme:
  name: material
  language: it
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: blue grey
      accent: green
      toggle:
        icon: material/weather-night
        name: Passa a dark mode

    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Passa a light mode
        
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list      
      
