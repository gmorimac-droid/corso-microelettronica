site_name: Corso di Microelettronica Digitale
site_description: Corso completo su HDL, verification e tool FPGA/ASIC
site_url: https://example.github.io/corso-microelettronica/

theme:
  name: material
  language: it
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list      
      
nav:
  - Home: index.md
  - 00 Introduzione: 00_introduzione.md
  - 01 Fondamenti: 01_fondamenti.md
  - 02 VHDL: 
    - Overview: 02_vhdl.md
    - Flusso di progettazione: 02_vhdl_progettazione.md
  - 03 Verilog:
      - Overview: 03_verilog.md
      - Flowchart: 03_verilog_flow_chart.md
      - Foglio di lavoro:
          - Introduzione: Libro_Verilog/index.md
          - The Tool Flow: Libro_Verilog/tool_flow.md
          - In and Out: Libro_Verilog/in_out.md
          - Utilities: Libro_Verilog/utilities.md
          - Clocks and Registers: Libro_Verilog/clocks_registers.md
          - State Machines: Libro_Verilog/state_machines.md
          - Modular Design: Libro_Verilog/modular_design.md
          - Memories: Libro_Verilog/memories.md
          - Managing Clocks: Libro_Verilog/managing_clocks.md
          - I/O Flavors: Libro_Verilog/io_flavors.md
          - A Taste of Simulation: Libro_Verilog/simulation.md
          - The Rest for Reference: Libro_Verilog/reference.md
  - 04 SystemVerilog Design: 
    - Overview: 04_systemverilog_design.md
    - Flowchart: 04_SV_flow_chart.md
  - 05 Verification Base: 05_verification_base.md
  - 06 UVM: 
    - Overview: 06_uvm.md
    - Flowchart: 06_uvm_flow_chart.md    
  - 07 FPGA Flow: 
    - Overview: 07_fpga_flow.md
    - Flowchart: 07_fpga_flow_chart.md
  - 08 ASIC Flow: 
    - Overview: 08_asic_flow.md
    - Flowchart: 08_asic_flow_chart.md
  - 09 Progetti: 
    - Overview: 09_progetti.md
    - Sorgenti: 09_codice.md
  - 10 Tool e TCL: 
    - Overview: 10_tool_e_tcl.md
    - 📚 Risorse:
          - GTKWave Docs: https://gtkwave.github.io/gtkwave/
          - Verilator Docs: https://verilator.org/guide/latest/
    - Flowchart: 10_tcl_flow_chart.md
    - Tool flow: 10_tool_flow.md
  - 11 Appendici: 11_appendici.md